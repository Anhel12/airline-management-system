<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>Aviro Airlines - Вход в профиль</title>
    <link rel="stylesheet" th:href="@{/styles/signup.css}" />
</head>
<body>
<main class="screen">
    <div class="rectangle" role="presentation"></div>
    <header class="view">
        <div class="aviro-airlines">
            <h1 class="div">
                <a th:href="@{/home}" class="div">
                    <span class="brand-bold">Aviro</span> Airlines
                </a>
            </h1>
        </div>
        <a th:href="@{/home}" class="close" aria-label="Закрыть">
            <svg width="25" height="25" viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0.201343 0.490215L0.332833 0.332833C0.727302 -0.0616356 1.33963 -0.105466 1.78251 0.201343L1.93989 0.332833L12.5 10.8932L23.0601 0.332833C23.5039 -0.110944 24.2234 -0.110944 24.6672 0.332833C25.1109 0.776611 25.1109 1.49612 24.6672 1.93989L14.1068 12.5L24.6672 23.0601C25.0616 23.4546 25.1055 24.0669 24.7987 24.5098L24.6672 24.6672C24.2727 25.0616 23.6604 25.1055 23.2175 24.7987L23.0601 24.6672L12.5 14.1068L1.93989 24.6672C1.49612 25.1109 0.776611 25.1109 0.332833 24.6672C-0.110944 24.2234 -0.110944 23.5039 0.332833 23.0601L10.8932 12.5L0.332833 1.93989C-0.0616356 1.54542 -0.105466 0.933097 0.201343 0.490215Z" fill="#212121" />
            </svg>
        </a>
    </header>
    <section class="view-2">
        <div class="view-6">
            <h2 class="text-wrapper-6">Регистрация профиля</h2>
            <p class="text-wrapper-5">Для регистрации введите почту и пароль</p>
            <div class="error" th:if="${errors}">
                <p style="color: red" th:each="error: ${errors}" th:text="${error.defaultMessage}">Error Message</p>
            </div>
            <div class="error" th:if="${email}">
                <p style="color: red" th:text="${email}">Error Message</p>
            </div>
        </div>
        <form class="login-form" th:action="@{/signup}" method="POST" th:object="${passenger}">
            <div class="div-3">
                <label for="email" class="text-wrapper-4"></label>
                <input
                        type="text"
                        id="email"
                        name="email"
                        class="div-2"
                        required
                        aria-required="true"
                        autocomplete="email"
                        placeholder="Почта"
                        th:value="*{email}"
                />
            </div>
            <div class="view-5">
                <label for="password" class="text-wrapper-3"></label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        class="div-2"
                        required
                        aria-required="true"
                        autocomplete="password"
                        placeholder="Пароль"
                        th:value="*{password}"
                />
            </div>
            <div class="view-3">
                <button type="submit" class="view-4">
                    <span class="text-wrapper-2">Регистрация</span>
                </button>
            </div>
            <div class="login">
                <a th:href="@{/login}" class="text-wrapper-log">Вход</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
